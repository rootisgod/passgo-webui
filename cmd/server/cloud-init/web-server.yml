#cloud-config

# Install Nginx and serve a basic landing page.

package_update: true

packages:
  - nginx

write_files:
  - path: /var/www/html/index.html
    content: |
      <!DOCTYPE html>
      <html>
      <head><title>Welcome</title></head>
      <body><h1>VM is running</h1></body>
      </html>
    owner: www-data:www-data
    permissions: "0644"

runcmd:
  - systemctl enable nginx
  - systemctl start nginx
