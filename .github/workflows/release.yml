name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install UPX
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl

      - name: Build all platforms
        env:
          RUN_NUMBER: ${{ github.run_number }}
          GIT_COMMIT: ${{ github.sha }}
        run: |
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          for platform in "${platforms[@]}"; do
            goos="${platform%/*}"
            goarch="${platform#*/}"
            binary_name="passgo-web-${goos}-${goarch}"
            if [ "$goos" = "windows" ]; then
              binary_name="${binary_name}.exe"
            fi

            echo "Building ${binary_name}..."
            CGO_ENABLED=0 GOOS=$goos GOARCH=$goarch go build \
              -ldflags="-s -w \
                -X main.Version=0.${RUN_NUMBER} \
                -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
                -X main.GitCommit=${GIT_COMMIT}" \
              -o "$binary_name" ./cmd/server/

            # UPX compression (skip macOS — compatibility issues)
            if [ "$goos" != "darwin" ]; then
              upx --best --lzma "$binary_name" || true
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: passgo-web-*
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: release/

      - name: Generate checksums
        run: |
          cd release
          for file in passgo-web-*; do
            sha256sum "$file" > "$file.sha256"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          RUN_NUMBER: ${{ github.run_number }}
          GIT_COMMIT: ${{ github.sha }}
        with:
          tag_name: v0.${{ github.run_number }}
          name: Release v0.${{ github.run_number }}
          body: |
            ## PassGo Web v0.${{ github.run_number }}

            Automated build from commit ${{ github.sha }}.

            ### Downloads

            | Platform | Binary |
            |----------|--------|
            | Linux x86_64 | `passgo-web-linux-amd64` |
            | Linux ARM64 | `passgo-web-linux-arm64` |
            | macOS Intel | `passgo-web-darwin-amd64` |
            | macOS Apple Silicon | `passgo-web-darwin-arm64` |
            | Windows x86_64 | `passgo-web-windows-amd64.exe` |

            ### Verify download

            ```bash
            sha256sum -c passgo-web-linux-amd64.sha256
            ```
          files: release/*
          draft: false
          prerelease: false
