name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Task
        run: go install github.com/go-task/task/v3/cmd/task@latest

      - name: Download modules
        run: go mod download

      - name: Stub frontend dist for go:embed
        run: |
          mkdir -p cmd/server/frontend/dist
          echo '<!doctype html><title>stub</title>' > cmd/server/frontend/dist/index.html

      - name: go vet
        run: go vet ./...

      - name: Run tests with race detector
        run: task test-race
